<div class="min-h-screen bg-gray-100 flex justify-center items-start pt-10 pb-10 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-md border border-gray-200 p-8">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Welcome Back</h1>
      <p class="mt-2 text-gray-500">
        Sign in to your account to continue
      </p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Email
        </label>

        <input
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          class="w-full px-3 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400"
        />

        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']"
           class="mt-1 text-sm text-red-600">
          Email is required
        </p>

        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']"
           class="mt-1 text-sm text-red-600">
          Please enter a valid email
        </p>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Password
        </label>

        <div class="relative">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter your password"
            class="w-full px-3 py-3 pr-10 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400"
          />

          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute right-3 top-3 text-gray-400 hover:text-gray-600"
          >
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>

        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']"
           class="mt-1 text-sm text-red-600">
          Password is required
        </p>
      </div>

      <!-- Remember Me & Forgot Password -->
      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input
            id="remember-me"
            name="remember-me"
            type="checkbox"
            class="h-4 w-4 text-orange-600 focus:ring-orange-500 border-gray-300 rounded"
          />
          <label for="remember-me" class="ml-2 block text-sm text-gray-900">
            Remember me
          </label>
        </div>

        <div class="text-sm">
          <a href="#" class="font-medium text-orange-500 hover:text-orange-600">
            Forgot your password?
          </a>
        </div>
      </div>

      <!-- Error banner -->
      <div *ngIf="errorMessage$ | async as errorMessage"
           class="text-sm text-red-600 bg-red-50 border border-red-200 p-3 rounded-lg text-center">
        {{ errorMessage }}
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || (loading$ | async)"
        class="w-full py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-xl transition disabled:bg-orange-300"
      >
        <span *ngIf="!(loading$ | async)">Sign In</span>
        <span *ngIf="loading$ | async">Signing in...</span>
      </button>

    </form>

    <!-- Sign up link -->
    <div class="mt-8 text-center text-sm text-gray-600 border-t pt-6">
      Don't have an account?
      <a
        (click)="navigateToSignup()"
        class="text-orange-500 hover:text-orange-600 font-medium cursor-pointer"
      >
        Sign up
      </a>
    </div>

  </div>
</div>

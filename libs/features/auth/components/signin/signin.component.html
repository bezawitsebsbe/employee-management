<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-md border border-gray-200 p-10">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Welcome back</h1>
      <p class="mt-2 text-gray-500">
        Enter your credentials to access your account
      </p>
    </div>

    <!-- Form -->
    <form [formGroup]="signinForm" (ngSubmit)="onSubmit()" class="space-y-6">

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
          Email
        </label>

        <div class="relative">
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
            ✉️
          </div>

          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="admin@powerhrm.com"
            class="w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400"
            [ngClass]="{
              'border-red-400 focus:ring-red-400': signinForm.get('email')?.touched && signinForm.get('email')?.invalid
            }"
          />
        </div>

        <p
          *ngIf="signinForm.get('email')?.touched && signinForm.get('email')?.errors?.['required']"
          class="mt-1 text-sm text-red-600"
        >
          Email is required
        </p>

        <p
          *ngIf="signinForm.get('email')?.touched && signinForm.get('email')?.errors?.['email']"
          class="mt-1 text-sm text-red-600"
        >
          Please enter a valid email
        </p>
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
          Password
        </label>

        <div class="relative">
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
            🔒
          </div>

          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400"
            [ngClass]="{
              'border-red-400 focus:ring-red-400': signinForm.get('password')?.touched && signinForm.get('password')?.invalid
            }"
          />

          <!-- Toggle password -->
          <button
            type="button"
            (click)="togglePasswordVisibility()"
            class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600"
          >
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>

        <p
          *ngIf="signinForm.get('password')?.touched && signinForm.get('password')?.errors?.['required']"
          class="mt-1 text-sm text-red-600"
        >
          Password is required
        </p>
      </div>

      <!-- Server Error -->
      <div
        *ngIf="errorMessage"
        class="text-sm text-red-600 bg-red-50 border border-red-200 p-3 rounded-lg text-center"
      >
        {{ errorMessage }}
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="signinForm.invalid || isLoading"
        class="w-full py-3 bg-orange-500 hover:bg-orange-600 text-white font-semibold rounded-xl transition disabled:bg-orange-300"
      >
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading">Signing in...</span>
      </button>

    </form>

    <!-- Demo credentials -->
    <div class="mt-6 text-center text-sm text-gray-500">
      Demo credentials pre-filled
    </div>

    <!-- Signup link -->
    <div class="mt-8 text-center text-sm text-gray-600 border-t pt-6">
      Don't have an account yet?
      <a
        (click)="navigateToSignup()"
        class="text-orange-500 hover:text-orange-600 font-medium cursor-pointer"
      >
        Sign up
      </a>
    </div>

  </div>
</div>

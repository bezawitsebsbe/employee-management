<div class="sidebar-container">
  <div class="sidebar-header">
    <h1 class="sidebar-title">Employee-MGMT</h1>
    <p class="sidebar-subtitle">Administrator</p>
  </div>

  <nav class="sidebar-nav">
    <button
      *ngFor="let item of filteredItems"
      (click)="navigate(item)"
      [class]="isActive(item) ? 'nav-item active' : 'nav-item inactive'"
    >
      <span class="nav-icon">{{ item.icon }}</span>
      <span class="nav-label">{{ item.label }}</span>
    </button>
  </nav>

  <!-- Logout Button -->
  <div class="sidebar-footer">
    <button
      (click)="logout()"
      class="logout-btn"
    >
      Logout
    </button>
  </div>
</div>

<nz-card
  nzTitle="Employees ({{ facade.filteredEmployees().length }})"
  [nzBordered]="false"
  class="h-full overflow-hidden shadow-sm bg-white rounded-xl"
>
  <div
    class="space-y-3 max-h-[calc(100vh-180px)] overflow-y-auto pr-3 custom-scrollbar"
  >
    @for (emp of facade.filteredEmployees(); track emp.id) {
      <nz-card
        nzHoverable
        class="cursor-pointer transition-all duration-200 hover:shadow-md rounded-lg"
        [class.bg-orange-50]="facade.selectedEmployee()?.id === emp.id"
        [class.border-l-4]="facade.selectedEmployee()?.id === emp.id"
        [class.border-orange-400]="facade.selectedEmployee()?.id === emp.id"
        (click)="select(emp)"
      >
        <div class="flex items-start gap-4">
          <div
            class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-xl shrink-0"
            [style.backgroundColor]="emp.avatarColor || '#1890ff'"
          >
            {{ emp.initials }}
          </div>

          <div class="flex-1 min-w-0">
            <div class="font-medium text-gray-900 truncate">
              {{ emp.fullName }}
            </div>
            <div class="text-sm text-gray-500 mt-0.5">{{ emp.empId }}</div>

            <div class="mt-1.5 flex flex-wrap items-center gap-2">
              <nz-tag
                [nzColor]="
                  emp.status === 'Active'
                    ? 'success'
                    : emp.status === 'Inactive'
                      ? 'error'
                      : 'default'
                "
                class="text-xs px-2 py-0.5"
              >
                {{ emp.status }}
              </nz-tag>
              <span class="text-sm text-gray-600">{{ emp.department }}</span>
            </div>

            <div class="mt-2 flex items-center gap-1.5 text-sm text-gray-700">
              <span
                nz-icon
                nzType="trophy"
                class="text-amber-500 text-base"
              ></span>
              <span class="font-medium">{{ emp.performance }}%</span>
            </div>
          </div>
        </div>
      </nz-card>
    } @empty {
      <div
        class="flex flex-col items-center justify-center py-16 text-gray-400"
      >
        <span nz-icon nzType="team" class="text-5xl mb-4 opacity-60"></span>
        <p>No employees found</p>
        <p class="text-sm mt-1">Try adjusting your search or filters</p>
      </div>
    }
  </div>
</nz-card>

<div class="payroll-records-table-container">
  <h2 class="table-title">Payroll Records</h2>
  
  <div class="table-wrapper">
    <table class="payroll-records-table">
      <thead>
        <tr>
          <th>Department</th>
          <th>Base Salary</th>
         
          <th>Monthly Bonus</th>
          <th>Deductions</th>
          <th>Net Salary</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let record of records">
          <td>{{ record.department }}</td>
          <td>{{ record.baseSalary }}</td>
          <td>{{ record.monthlyBonus }}</td>
          <td class="deductions">{{ record.deductions }}</td>
          <td class="net-salary">{{ record.netSalary }}</td>
          <td>
            <span class="status-badge" [ngClass]="getStatusClass(record.status)">
              {{ record.status }}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

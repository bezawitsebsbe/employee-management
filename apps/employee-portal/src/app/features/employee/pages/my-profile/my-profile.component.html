<div class="p-6 max-w-3xl mx-auto">
  <nz-card [nzBordered]="false" class="shadow-sm">
    <div class="flex justify-center mb-6">
      <nz-avatar [nzText]="'SS'" [nzSize]="120" class="bg-orange-400 text-white text-5xl"></nz-avatar>
    </div>
    <form [formGroup]="profileForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- fields with nz-input -->
      <input nz-input formControlName="fullName" placeholder="Full Name" />
      <input nz-input formControlName="email" placeholder="Email" />
      <!-- ... other fields -->
    </form>
    <button nz-button nzType="primary" class="mt-6 w-full bg-orange-500" (click)="save()">Save Changes</button>
  </nz-card>
</div>

<div class="p-6">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-gray-900">Dashboard</h1>
      <p class="text-gray-600">Welcome back! Here's what's happening today</p>
    </div>
    <div class="flex gap-3">
      <button nz-button nzType="default">Filter</button>
      <button nz-button nzType="primary" class="bg-orange-500 hover:bg-orange-600">+ Quick Action</button>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <!-- Remaining Leave -->
    <nz-card class="shadow-sm">
      <nz-statistic
        nzTitle="Remaining Leave"
        [nzValue]="data()?.remainingLeaveDays"
        nzSuffix="days"
        [nzValueStyle]="{ color: '#22c55e', 'font-weight': 700 }">
        <span nz-icon nzType="calendar" class="text-green-500 text-2xl"></span>
      </nz-statistic>
    </nz-card>

    <!-- Attendance -->
    <nz-card class="shadow-sm">
      <nz-statistic
        nzTitle="Attendance This Month"
        [nzValue]="data()?.attendanceThisMonth.present"
        nzSuffix="days present"
        [nzValueStyle]="{ color: '#3b82f6' }">
      </nz-statistic>
    </nz-card>

    <!-- Next Payslip -->
    <nz-card class="shadow-sm">
      <nz-statistic
        nzTitle="Next Payslip"
        [nzValue]="data()?.nextPayslipDate"
        [nzValueStyle]="{ color: '#eab308' }">
        <span nz-icon nzType="dollar" class="text-amber-500 text-2xl"></span>
      </nz-statistic>
    </nz-card>

    <!-- Quick Stats -->
    <nz-card class="shadow-sm">
      <nz-statistic
        nzTitle="Base Salary"
        [nzValue]="data()?.baseSalary"
        nzPrefix="$"
        [nzValueStyle]="{ color: '#22c55e' }">
      </nz-statistic>
    </nz-card>
  </div>

  <!-- Recent Activity -->
  <nz-card class="mt-8 shadow-sm">
    <nz-statistic nzTitle="Recent Activity" [nzValue]="' '" [nzValueStyle]="{display: 'none'}"></nz-statistic>
    <div class="space-y-4">
      @for (act of data()?.recentActivities; track act.id) {
        <div class="flex items-start gap-4">
          <div class="w-3 h-3 rounded-full mt-2" [style.backgroundColor]="act.color"></div>
          <div class="flex-1">
            <p class="text-gray-700">{{ act.message }}</p>
            <p class="text-xs text-gray-500">{{ act.date }}</p>
          </div>
        </div>
      }
    </div>
  </nz-card>
</div>

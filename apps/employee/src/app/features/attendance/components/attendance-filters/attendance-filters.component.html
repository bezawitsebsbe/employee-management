<div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex gap-4">
  <div class="flex-1">
    <input
      nz-input
      placeholder="Search employee..."
      class="w-72"
      [formControl]="searchTerm"
    />
  </div>

  <div>
    <nz-select
      nzPlaceHolder="Department"
      class="w-48"
      [formControl]="department"
    >
      <nz-option nzValue="" nzLabel="All Departments"></nz-option>
      <nz-option nzValue="Sales" nzLabel="Sales"></nz-option>
      <nz-option nzValue="Marketing" nzLabel="Marketing"></nz-option>
      <nz-option nzValue="HR" nzLabel="HR"></nz-option>
      <nz-option nzValue="Finance" nzLabel="Finance"></nz-option>
      <nz-option nzValue="IT" nzLabel="IT"></nz-option>
    </nz-select>
  </div>

  <div>
    <nz-select
      nzPlaceHolder="Status"
      class="w-40"
      [formControl]="status"
    >
      <nz-option nzValue="" nzLabel="All Status"></nz-option>
      <nz-option nzValue="Present" nzLabel="Present"></nz-option>
      <nz-option nzValue="Absent" nzLabel="Absent"></nz-option>
    </nz-select>
  </div>

  <div>
    <button nz-button (click)="clearFilters()">
      Clear Filters
    </button>
  </div>
</div>

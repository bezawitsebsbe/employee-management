<div class="new-employee-container h-full">
  <div class="bg-white rounded-lg shadow-sm p-6 h-full">
    <app-entity-form
      [data]="{}"
      [fields]="fields"
      [mode]="formMode"
      [standalone]="true"
      [readonly]="false"
      [showActions]="true"
      [formKey]="formInstanceKey"
      (submit)="onFormSubmit($event)"
      (cancel)="onFormCancel()"
    ></app-entity-form>
  </div>
</div>

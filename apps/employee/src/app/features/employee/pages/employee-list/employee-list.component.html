<!-- Main Content -->
<main class="flex-1 p-6 md:p-8 overflow-y-auto bg-gray-50">
  <!-- Header -->
  <div
    class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8"
  >
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Employee Management</h1>
      <p class="text-gray-600">
        Manage employee profiles, performance metrics, and compensation
        details
      </p>
    </div>
    <!-- Add Employee button will be handled by entity-table component -->
  </div>

  <!-- Master-Detail Layout -->
  <div class="flex gap-6 h-full">
    <!-- Employee List (Full width when no detail, 1/3 when detail shown) -->
    <div [ngClass]="(hasDetail$ | async) ? 'w-full md:w-1/3' : 'w-full'" class="employee-list-section">
      <!-- Entity Table Component with built-in filters -->
      <app-entity-table
        *ngIf="tableConfig$ | async as config"
        [config]="config"
        [data]="tableData"
        [setting]="tableSetting"
        [headerAction]="addEmployeeAction"
        [loading]="loading"
        (action)="onTableAction($event)"
        (filtersChange)="onFiltersChange($event)"
        (sortChange)="onSortChange($event)"
        (paginationChange)="onPaginationChange($event)"
      ></app-entity-table>
    </div>

    <!-- Detail Panel (2/3 width) -->
    <div class="hidden md:block w-2/3 detail-panel" *ngIf="hasDetail$ | async">
      <div class="bg-white rounded-lg shadow-md p-6 h-full relative">
        <!-- Close Button - Top Right -->
        <button (click)="closeDetail()" 
                class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 hover:bg-gray-100 p-2 rounded-md transition-all duration-200">
          <i nz-icon nzType="close" nzTheme="outline" nzSize="16"></i>
        </button>
        
        <!-- Employee Detail Component -->
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</main>

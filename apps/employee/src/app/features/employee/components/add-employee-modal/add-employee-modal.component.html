<nz-modal
  [nzVisible]="isVisible"
  nzTitle="Add New Employee"
  [nzFooter]="modalFooter"
  [nzClosable]="true"
  (nzOnCancel)="handleCancel()"
  nzWidth="900px"
  nzCentered
  nzMaskClosable="false"
  nzClassName="add-employee-modal"
>
  <ng-container *nzModalContent>
    <div class="p-6">
      <h3 class="text-lg font-semibold text-gray-800 mb-6">Basic Information</h3>

      <form [formGroup]="addForm" nz-form>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
          <!-- Full Name -->
          <nz-form-item>
            <nz-form-label nzRequired>Full Name *</nz-form-label>
            <input nz-input formControlName="fullName" placeholder="Mike Johnson" />
          </nz-form-item>

          <!-- Email -->
          <nz-form-item>
            <nz-form-label nzRequired>Email *</nz-form-label>
            <input nz-input type="email" formControlName="email" placeholder="mike.johnson@company.com" />
          </nz-form-item>

          <!-- Phone -->
          <nz-form-item>
            <nz-form-label>Phone</nz-form-label>
            <input nz-input formControlName="phone" placeholder="+1234-567-8922" />
          </nz-form-item>

          <!-- Department -->
          <nz-form-item>
            <nz-form-label>Department *</nz-form-label>
            <nz-select formControlName="department" nzPlaceHolder="Select department">
              @for (dept of departments; track dept) {
                <nz-option [nzValue]="dept" [nzLabel]="dept"></nz-option>
              }
            </nz-select>
          </nz-form-item>

          <!-- Position -->
          <nz-form-item>
            <nz-form-label>Position</nz-form-label>
            <input nz-input formControlName="position" placeholder="Sales Representative" />
          </nz-form-item>

          <!-- Join Date -->
          <nz-form-item>
            <nz-form-label>Join Date *</nz-form-label>
            <input nz-input formControlName="joinDate" placeholder="05/03/2023" />
          </nz-form-item>

          <!-- Status -->
          <nz-form-item>
            <nz-form-label>Status *</nz-form-label>
            <nz-select formControlName="status">
              <nz-option nzValue="Active" nzLabel="Active"></nz-option>
              <nz-option nzValue="Inactive" nzLabel="Inactive"></nz-option>
              <nz-option nzValue="On Leave" nzLabel="On Leave"></nz-option>
            </nz-select>
          </nz-form-item>

          <!-- Base Salary -->
          <nz-form-item>
            <nz-form-label nzRequired>Base Salary *</nz-form-label>
            <input nz-input type="number" formControlName="baseSalary" placeholder="3800" />
          </nz-form-item>
        </div>
      </form>
    </div>
  </ng-container>

  <ng-template #modalFooter>
    <button nz-button (click)="handleCancel()">Cancel</button>
    <button
      nz-button
      nzType="primary"
      [disabled]="addForm.invalid"
      (click)="handleOk()"
      class="bg-orange-500 hover:bg-orange-600 border-none"
    >
      Add Employee
    </button>
  </ng-template>
</nz-modal>
